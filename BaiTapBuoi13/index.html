<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Strips Hover Effect</title>
</head>
<body>
    <div class="container">
        <div class="strip strip-one">
            <div class="strip__name">Relax</div>
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&h=600&fit=crop" alt="" class="img">
            <div class="overlay"></div>
        </div>
        <div class="strip strip-two">
            <div class="strip__name">Explore</div>
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&h=600&fit=crop" alt="" class="img">
            <div class="overlay"></div>
        </div>
        <div class="strip strip-three">
            <div class="strip__name">Travel</div>
            <img src="https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800&h=600&fit=crop" alt="" class="img">
            <div class="overlay"></div>
        </div>
        <div class="strip strip-four">
            <div class="strip__name">Achieve</div>
            <img src="https://images.unsplash.com/photo-1484589065579-248aad0d8b13?w=800&h=600&fit=crop" alt="" class="img">
            <div class="overlay"></div>
        </div>
        <div class="strip strip-five">
            <div class="strip__name">Dare</div>
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop" alt="" class="img">
            <div class="overlay"></div>
        </div>
    </div>
</body>
</html>
